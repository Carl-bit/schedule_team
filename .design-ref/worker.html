<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule — Panel Trabajador</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --bg:        #161b2a;
  --bg-deep:   #0f1320;
  --bg-card:   #1c2138;
  --border:    #2e3650;
  --bsub:      #222840;
  --primary:   #7c3aed;
  --pri-dim:   #6d28d9;
  --pri-glow:  rgba(124,58,237,.2);
  --pri-fg:    #f5f3ff;
  --fg:        #f0f2f9;
  --fgm:       #8b97bc;
  --fgs:       #4a5270;
  --success:   #10b981;
  --warn:      #f59e0b;
  --red:       #ef4444;
  --cyan:      #06b6d4;
  --pink:      #db2777;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

.hd{font-family:'Plus Jakarta Sans',sans-serif;}
.topbar{height:64px;background:var(--bg-deep);border-bottom:1px solid var(--bsub);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;gap:20px;}
.topbar-logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1rem;color:var(--fg);display:flex;align-items:center;gap:7px;text-decoration:none;}
.topbar-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:0 0 8px var(--primary);}
.topbar-section{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:.8rem;color:var(--fgs);padding:4px 12px;background:var(--bsub);border-radius:100px;}
.logout-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--fgm);font-size:.75rem;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.logout-btn:hover{border-color:var(--primary);color:var(--fg);}

.layout{display:flex;height:calc(100vh - 64px);overflow:hidden;}
.sidebar-l{width:240px;flex-shrink:0;background:var(--bg-deep);border-right:1px solid var(--bsub);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-r{width:264px;flex-shrink:0;background:var(--bg-deep);border-left:1px solid var(--bsub);display:flex;flex-direction:column;overflow:hidden;}
.center{flex:1;overflow:hidden;display:flex;flex-direction:column;}

.sec-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--fgs);padding:16px 14px 8px;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 10px 10px;}
.stat-box{background:var(--bg-card);border:1px solid var(--bsub);border-radius:10px;padding:12px 10px;}
.stat-box-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fgs);margin-bottom:4px;}
.stat-box-val{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.4rem;color:var(--fg);}
.stat-box-val.purple{color:var(--primary);}
.stat-box-val.green{color:var(--success);}
.stat-box-val.warn{color:var(--warn);}
.stat-box-val.red{color:var(--red);}
.stat-box-full{background:var(--bg-card);border:1px solid var(--bsub);border-radius:10px;padding:12px 10px;margin:0 10px 10px;}

.date-filter{margin:0 10px 10px;background:var(--bg-card);border:1px solid var(--bsub);border-radius:10px;padding:10px;display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--fgm);}
.date-badge{background:var(--bsub);border-radius:6px;padding:4px 8px;font-weight:600;color:var(--fg);}

.shift-mini{padding:8px 14px;border-top:1px solid var(--bsub);display:flex;flex-direction:column;gap:2px;}
.shift-mini-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.shift-mini-time{font-size:.68rem;font-weight:700;color:var(--fg);}
.shift-mini-sub{font-size:.65rem;color:var(--fgm);}

/* RIGHT PANEL */
.profile-card{padding:20px 14px;border-bottom:1px solid var(--bsub);}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:#fff;flex-shrink:0;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:13px 18px;border:none;background:transparent;color:var(--fgm);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:.84rem;cursor:pointer;width:100%;text-align:left;transition:background .2s,color .2s;border-radius:0;}
.nav-btn:hover{background:rgba(124,58,237,.08);color:var(--fg);}
.nav-btn.active{background:rgba(124,58,237,.14);color:var(--primary);}
.nav-icon{width:16px;text-align:center;font-size:.85rem;flex-shrink:0;}

/* CENTER SCREENS */
.screen{flex:1;overflow-y:auto;padding:24px 28px;}

/* STAT CARDS ROW */
.center-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.cstat{background:var(--bg-card);border:1px solid var(--bsub);border-radius:12px;padding:20px 18px;position:relative;overflow:hidden;}
.cstat::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;filter:blur(30px);pointer-events:none;}
.cstat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;margin-bottom:12px;}
.cstat-val{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:2rem;margin-bottom:4px;}
.cstat-sub{font-size:.72rem;color:var(--fgm);line-height:1.4;}

/* WELCOME BANNER */
.welcome{background:linear-gradient(135deg,rgba(124,58,237,.18) 0%,rgba(109,40,217,.08) 100%);border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.welcome h2{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:4px;}
.welcome p{font-size:.82rem;color:var(--fgm);}

/* SECTION CARD */
.section-card{background:var(--bg-card);border:1px solid var(--bsub);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.section-card-head{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--bsub);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.82rem;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--fgs);gap:10px;}
.empty-icon{font-size:2rem;opacity:.4;}
.empty-text{font-size:.82rem;}

/* CALENDAR */
.cal-screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.cal-header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--bsub);flex-shrink:0;}
.cal-header h2{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.1rem;flex:1;}
.cal-nav-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--fgm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s;}
.cal-nav-btn:hover{border-color:var(--primary);color:var(--primary);}
.month-label{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.95rem;min-width:110px;text-align:center;}
.cal-legend{display:flex;align-items:flex-start;gap:8px;padding:12px 24px;border-bottom:1px solid var(--bsub);flex-shrink:0;flex-wrap:wrap;min-height:52px;}
.shift-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:100px;font-size:.7rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
.tab-pill{padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;}
.tab-pill.active{background:var(--primary);color:var(--pri-fg);}
.tab-pill.inactive{background:transparent;color:var(--fgm);border:1px solid var(--border);}

.cal-day-headers{display:grid;grid-template-columns:repeat(7,1fr);flex-shrink:0;}
.cal-day-hdr{padding:8px 12px;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--fgs);text-align:center;border-bottom:1px solid var(--bsub);}
.cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:0;overflow:hidden;background:var(--border);}
.cal-cell{border:none;padding:8px;display:flex;flex-direction:column;gap:4px;overflow:hidden;min-height:0;background:var(--bg-card);}
.cal-cell.other-month{background:var(--bg-deep);opacity:.5;}
.cal-cell.today .cal-day-num{background:var(--primary);color:#fff;border-radius:50%;}
.cal-day-num{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0;}
.cal-event{border-radius:5px;padding:4px 7px;font-size:.65rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;line-height:1.3;}

/* SOLICITUDES */
.sol-tabs{display:flex;border-bottom:1px solid var(--bsub);padding:0 24px;flex-shrink:0;}
.sol-tab{padding:14px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--fgm);transition:all .2s;display:flex;align-items:center;gap:6px;background:none;border-top:none;border-left:none;border-right:none;}
.sol-tab:hover{color:var(--fg);}
.sol-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.sol-badge{font-size:.62rem;font-weight:800;padding:2px 6px;border-radius:100px;background:rgba(124,58,237,.2);color:var(--primary);}
.sol-stats-row{display:grid;grid-template-columns:repeat(5,1fr) 1px repeat(2,1fr);gap:0;border-bottom:1px solid var(--bsub);flex-shrink:0;}
.sol-stat{padding:16px;text-align:center;border-right:1px solid var(--bsub);}
.sol-stat:last-child{border-right:none;}
.sol-stat-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--fgs);margin-bottom:4px;}
.sol-stat-val{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.4rem;}
.sol-divider{background:var(--bsub);width:1px;}
.sol-list{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px;}
.sol-date-group{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--fgs);padding:4px 0 8px;}
.sol-item{background:var(--bg-card);border:1px solid var(--bsub);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px;transition:border-color .2s;}
.sol-item:hover{border-color:var(--border);}
.sol-item-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.status-badge{font-size:.65rem;font-weight:800;padding:3px 9px;border-radius:100px;}
.badge-warn{background:rgba(245,158,11,.15);color:#f59e0b;}
.badge-green{background:rgba(16,185,129,.15);color:#10b981;}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444;}
.badge-purple{background:rgba(124,58,237,.15);color:#7c3aed;}
.badge-plan{background:rgba(6,182,212,.15);color:#06b6d4;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ── CONSTANTS ── */
const SHIFTS = {
  turnoAR: { name:'Turno A Con Reserv.', color:'#f59e0b', bg:'rgba(245,158,11,.15)', border:'rgba(245,158,11,.5)', time:'08:00–16:30' },
  turnoA:  { name:'Turno A',             color:'#7c3aed', bg:'rgba(124,58,237,.15)', border:'rgba(124,58,237,.5)', time:'08:00–16:30' },
  turnoB:  { name:'Turno B',             color:'#10b981', bg:'rgba(16,185,129,.15)', border:'rgba(16,185,129,.5)', time:'06:00–14:00' },
  turnoC:  { name:'Turno C',             color:'#06b6d4', bg:'rgba(6,182,212,.15)',  border:'rgba(6,182,212,.5)',  time:'00:00–07:00' },
  noDisp:  { name:'No Disponible',       color:'#ef4444', bg:'rgba(239,68,68,.15)',  border:'rgba(239,68,68,.5)',  time:'Todo el día' },
  licencia:{ name:'Licencia Médica',     color:'#06b6d4', bg:'rgba(6,182,212,.15)',  border:'rgba(6,182,212,.5)',  time:'Todo el día' },
  reemplazo:{ name:'Reemplazo',          color:'#db2777', bg:'rgba(219,39,119,.15)', border:'rgba(219,39,119,.5)', time:'Todo el día' },
  permAdm: { name:'Permiso Administ.',   color:'#ef4444', bg:'rgba(239,68,68,.15)',  border:'rgba(239,68,68,.5)',  time:'Todo el día' },
};

const EVENTS = {
  '2026-04-01':[ {t:'turnoB'} ], '2026-04-02':[ {t:'turnoB'} ],
  '2026-04-03':[ {t:'turnoB'} ], '2026-04-04':[ {t:'turnoB'} ],
  '2026-04-05':[ {t:'turnoB'} ],
  '2026-04-09':[ {t:'reemplazo'} ], '2026-04-10':[ {t:'reemplazo'} ],
  '2026-04-11':[ {t:'reemplazo'} ], '2026-04-12':[ {t:'reemplazo'} ],
  '2026-04-15':[ {t:'reemplazo'} ],
  '2026-04-17':[ {t:'turnoAR'} ],
  '2026-04-18':[ {t:'permAdm'} ],
  '2026-04-19':[ {t:'reemplazo'} ],
  '2026-04-21':[ {t:'reemplazo'} ], '2026-04-22':[ {t:'reemplazo'} ],
  '2026-04-23':[ {t:'reemplazo'} ], '2026-04-24':[ {t:'reemplazo'} ],
  '2026-04-25':[ {t:'reemplazo'} ],
  '2026-04-30':[ {t:'turnoA'} ],
};

const HORAS = [
  { id:1, date:'Viernes, 15 de Mayo de 2026',  label:'Turno Planificado', tag:'plan',  range:'vie 15 may · 02:00–17:00', dur:'1h',  status:'pending' },
  { id:2, date:'Viernes, 17 de Abril de 2026', label:'Turno Planificado', tag:'plan',  range:'vie 11 abr · 08:00–19:30', dur:'8h',  status:'pending' },
  { id:3, date:'Jueves, 29 de Marzo de 2026',  label:'Turno Planificado', tag:'plan',  range:'jue 28 mar · 08:00–19:00', dur:'75h', status:'pending' },
  { id:4, date:'Miércoles, 25 de Marzo de 2026',label:'Turno Planificado',tag:'plan',  range:'mié 19 mar · 08:00–13:00', dur:'10h', status:'pending' },
  { id:5, date:'Martes, 24 de Marzo de 2026',  label:'Turno Planificado', tag:'plan',  range:'mar 19 feb · 09:00–13:30', dur:'10h', status:'pending' },
  { id:6, date:'Lunes, 03 de Marzo de 2026',   label:'Turno Planificado', tag:'plan',  range:'lun 23 mar · 08:00–16:30', dur:'8h',  status:'pending' },
];

const COBERTURAS = [
  { id:1, date:'Jueves, 19 de Marzo de 2026', role:'Administrativo', tag:'completa', createdBy:'Carlos', range:'jue 29 abr – lun 25 abr', dias:'4 días', status:'accepted' },
  { id:2, date:'Jueves, 19 de Marzo de 2026', role:'Administrativo', tag:'completa', createdBy:'Carlos', range:'jue 10 abr – mié 23 abr', dias:'0 días', status:'accepted' },
  { id:3, date:'Jueves, 19 de Marzo de 2026', role:'Administrativo', tag:'sustituto', createdBy:'Carlos', range:'dom 19 abr – mar 21 abr', dias:'4 días', status:'accepted' },
];

/* ── UTILS ── */
const pad  = n => String(n).padStart(2,'0');
const key  = (y,m,d) => `${y}-${pad(m)}-${pad(d)}`;
const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const DAYS = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function calendarDays(year, month) {
  // month: 0-indexed. Returns array of {year,month,day,isCurrentMonth}
  // Week starts Monday
  const first = new Date(year, month, 1);
  const last  = new Date(year, month+1, 0);
  const startDow = (first.getDay() + 6) % 7; // 0=Mon
  const cells = [];
  let d = new Date(year, month, 1 - startDow);
  while (cells.length < 35 || d <= last) {
    cells.push({ y:d.getFullYear(), m:d.getMonth()+1, d:d.getDate(), cur: d.getMonth()===month });
    d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1);
    if (cells.length >= 35 && d > last) break;
  }
  while (cells.length < 35) {
    cells.push({ y:d.getFullYear(), m:d.getMonth()+1, d:d.getDate(), cur:false });
    d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1);
  }
  return cells;
}

/* ── SMALL COMPONENTS ── */
function Avatar({ name, color='#7c3aed', size=38 }) {
  return <div className="avatar" style={{ width:size, height:size, background:color, fontSize:size*.35 }}>{initials(name)}</div>;
}

/* ── DATE PICKER ── */
const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DAY_ABBR = ['L','M','X','J','V','S','D'];

function PickerMiniCal({ year, month, startKey, endKey, hoverKey, onDay, onHover }) {
  const days = calendarDays(year, month);
  const fmt = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return (
    <div style={{minWidth:176}}>
      <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.8rem',textAlign:'center',marginBottom:10,color:'var(--fg)'}}>{MONTHS_FULL[month]} {year}</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1,marginBottom:4}}>
        {DAY_ABBR.map(d=><div key={d} style={{textAlign:'center',fontSize:'.58rem',fontWeight:800,color:'var(--fgs)',padding:'2px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {days.map((cell,i)=>{
          const k = fmt(cell.y, cell.m, cell.d);
          const isS = k===startKey, isE = k===endKey;
          const ek = endKey||hoverKey;
          const inR = startKey&&ek && k>startKey && k<ek;
          return (
            <div key={i}
              onClick={()=>cell.cur && onDay(cell)}
              onMouseEnter={()=>cell.cur && onHover(k)}
              style={{
                width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',
                borderRadius: isS||isE ? '50%' : inR ? 3 : 4,
                background: isS||isE ? 'var(--primary)' : inR ? 'rgba(124,58,237,.18)' : 'transparent',
                color: isS||isE ? '#fff' : !cell.cur ? 'var(--fgs)' : 'var(--fg)',
                fontSize:'.7rem', fontWeight: isS||isE ? 700 : 400,
                cursor: cell.cur ? 'pointer' : 'default',
                opacity: !cell.cur ? .25 : 1,
                transition:'background .12s',
              }}>
              {cell.d}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── LEFT SIDEBAR ── */
function LeftSidebar() {
  const [open, setOpen]       = useState(false);
  const [startKey, setStart]  = useState('2026-04-01');
  const [endKey,   setEnd]    = useState('2026-04-30');
  const [hover,    setHover]  = useState(null);
  const [stage,    setStage]  = useState('idle');
  const [pm,       setPm]     = useState(3); // picker month (0-indexed)

  const fmtKey = k => {
    if (!k) return '—';
    const [,m,d] = k.split('-');
    return `${parseInt(d)} ${MONTHS_SHORT[parseInt(m)-1]}`;
  };

  const onDay = cell => {
    const k = `${cell.y}-${String(cell.m).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
    if (stage === 'start') { setStart(k); setEnd(null); setStage('end'); }
    else { k < startKey ? (setEnd(startKey), setStart(k)) : setEnd(k); setStage('idle'); setOpen(false); }
  };

  const m2 = pm >= 11 ? 0 : pm+1;
  const y2 = pm >= 11 ? 2027 : 2026;

  return (
    <aside className="sidebar-l" style={{position:'relative'}}>
      <p className="sec-label" style={{paddingTop:20,display:'flex',alignItems:'center',gap:6}}>
        <span>📅</span> Resumen del mes
      </p>

      {/* Clickable date filter */}

function CalendarScreen() {
  const [month, setMonth] = useState(3); // April = 3 (0-indexed)
  const [year]  = useState(2026);
  const [tab, setTab] = useState('etiquetas');
  const days = useMemo(() => calendarDays(year, month), [year, month]);
  const today = { y:2026, m:4, d:24 };

  const legendShifts = ['turnoAR','turnoA','turnoB','turnoC','noDisp','licencia'];

  return (
    <div className="cal-screen">
      {/* Header */}
      <div className="cal-header">
        <h2>Calendario De Turnos</h2>
        <p style={{fontSize:'.78rem',color:'var(--fgm)',flex:1}}>Planifica tus horarios y etiquetas</p>
        <button className="cal-nav-btn" onClick={() => setMonth(m => m-1)}>‹</button>
        <span className="month-label">{MONTHS[month]} {year}</span>
        <button className="cal-nav-btn" onClick={() => setMonth(m => m+1)}>›</button>
        <div style={{width:1,height:20,background:'var(--bsub)',margin:'0 8px'}} />
        <button style={{display:'flex',alignItems:'center',gap:6,background:'var(--primary)',color:var_fg,border:'none',borderRadius:8,padding:'7px 14px',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>+ Nuevo Patrón / Etiqueta</button>
        <button style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 12px',color:'var(--fgm)',fontSize:'.75rem',fontWeight:600,cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Desactivar</button>
        <button style={{background:'var(--primary)',border:'none',borderRadius:8,padding:'7px 14px',color:'var(--pri-fg)',fontSize:'.75rem',fontWeight:700,cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Guardar Horario</button>
      </div>

      {/* Legend bar */}
      <div className="cal-legend">
        <button className={`tab-pill ${tab==='etiquetas'?'active':'inactive'}`} onClick={() => setTab('etiquetas')}>Etiquetas</button>
        <button className={`tab-pill ${tab==='patrones'?'active':'inactive'}`} onClick={() => setTab('patrones')}>Patrones</button>
        <div style={{width:1,height:20,background:'var(--bsub)',margin:'0 4px'}} />
        <span style={{fontSize:'.72rem',color:'var(--fgs)',marginRight:4}}>Selecciona una etiqueta para asignar</span>
        {legendShifts.map(sk => {
          const s = SHIFTS[sk];
          return (
            <div key={sk} className="shift-pill" style={{background:s.bg, border:`1px solid ${s.border}`, color:s.color}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:s.color,flexShrink:0}} />
              {s.name}
              <span style={{opacity:.7,fontSize:'.62rem',marginLeft:2}}>{s.time}</span>
            </div>
          );
        })}
      </div>

      {/* Day headers */}
      <div className="cal-day-headers">
        {DAYS.map(d => <div key={d} className="cal-day-hdr">{d}</div>)}
      </div>

      {/* Grid */}
      <div className="cal-grid">
        {days.map((cell, i) => {
          const dk = key(cell.y, cell.m, cell.d);
          const evts = EVENTS[dk] || [];
          const isToday = cell.y===today.y && cell.m===today.m && cell.d===today.d;
          return (
            <div key={i} className={`cal-cell ${!cell.cur?'other-month':''} ${isToday?'today':''}`}>
              <div className="cal-day-num">{cell.d}</div>
              {evts.map((ev, j) => {
                const s = SHIFTS[ev.t];
                if (!s) return null;
                return (
                  <div key={j} className="cal-event" style={{background:s.bg, borderLeft:`3px solid ${s.color}`, color:s.color}}>
                    {s.name}
                    <br />
                    <span style={{fontWeight:400, opacity:.8}}>{s.time}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex'}}>
                {p.members.slice(0,4).map((m,mi)=>(
                  <div key={mi} style={{marginLeft:mi>0?-8:0,width:26,height:26,borderRadius:'50%',background:PC[mi%PC.length],display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.65rem',fontWeight:800,color:'#fff',border:'2px solid var(--bg-card)',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{m.name[0]}</div>
                ))}
              </div>
              <button onClick={()=>setModal(p)} style={{background:'none',border:'none',color:'var(--primary)',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>Ver detalles →</button>
            </div>
          </div>
        ))}
      </div>
      {modal && (
        <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.65)',backdropFilter:'blur(4px)'}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:14,padding:28,width:440,boxShadow:'0 40px 80px rgba(0,0,0,.6)'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}>
              <div>
                <h3 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:'1.05rem',marginBottom:6}}>{modal.name}</h3>
                <span style={{fontSize:'.63rem',fontWeight:700,padding:'2px 8px',borderRadius:100,background:'rgba(6,182,212,.15)',color:'#06b6d4'}}>{modal.id}</span>
              </div>
              <button onClick={()=>setModal(null)} style={{background:'none',border:'none',color:'var(--fgm)',cursor:'pointer',fontSize:'1.4rem',lineHeight:1}}>×</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:20}}>
              {[['Cliente',modal.cliente],['Fecha Inicio',modal.inicio],['Fecha Entrega',modal.entrega]].map(([l,v])=>(
                <div key={l} style={{background:'var(--bg-deep)',borderRadius:8,padding:'9px 10px'}}>
                  <p style={{fontSize:'.58rem',fontWeight:700,color:'var(--fgs)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>{l}</p>
                  <p style={{fontSize:'.78rem',fontWeight:600}}>{v}</p>
                </div>
              ))}
            </div>
            <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.85rem',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
              <span>👥</span> Integrantes del Proyecto ({modal.members.length})
            </p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>
              {modal.members.map((m,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:'var(--bg-deep)',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{width:30,height:30,borderRadius:'50%',background:PC[i%PC.length],display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.7rem',fontWeight:800,color:'#fff',flexShrink:0,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{m.name[0]}</div>
                  <div><p style={{fontWeight:700,fontSize:'.82rem'}}>{m.name}</p><p style={{fontSize:'.68rem',color:'var(--fgm)'}}>{m.role}</p></div>
                </div>
              ))}
            </div>
            <button onClick={()=>setModal(null)} style={{width:'100%',background:'var(--primary)',border:'none',borderRadius:9,padding:'11px',color:'#fff',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.85rem',cursor:'pointer'}}>Cerrar Detalles</button>
          </div>
        </div>
      )}
    </div>
  );
}
